interface:
  display_name: "B200 Contest Optimizer"
  short_description: "Optimize B200 FlashInfer kernels with local-reference recon, web repo search, and CUDA 13.2 tactics"
  default_prompt: "Use $flashinfer-b200-contest-optimizer to optimize MLSYS26 FlashInfer operators on B200. Before any optimization, refresh only the current project's local reference git repos with git pull --ff-only when clean, do not scan sibling ../ repos, and if local references are insufficient, search high-quality official online repos for reusable operators and Blackwell/B200 optimization ideas. Then run paired-baseline gates, staged 2-3 representative-regime exploration before expensive full sweeps on definitions with more than 40 workloads, preserve single-shape wins via cheap dispatch, ask the user before full multi-GPU evaluation, extract compact NCU metrics, apply Blackwell tactics such as clusters / DSMEM / L2 persistence / cluster launch control, run official flashinfer-ci-cu132 isolated-runner parity checks, archive artifacts, and require promotion-safe repeats."
