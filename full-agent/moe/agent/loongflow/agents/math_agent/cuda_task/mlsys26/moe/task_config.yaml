# MoE FP8 block-scale Triton configuration
workspace_path: "./output"

# Global LLM configuration
llm_config:
  url: "https://api.chatanywhere.tech/v1"
  api_key: "${LLM_API_KEY}"
  model: "openai/claude-opus-4-7"
  temperature: 0.9
  context_length: 128000
  max_tokens: 32768
  timeout: 1200

# ------------------------------------------------------------------------------
# Define all available components
# ------------------------------------------------------------------------------

planners:
  evolve_planner:
    react_max_steps: 5

executors:
  evolve_executor_react:
    parallel_candidates: 1
    max_rounds: 3
    react_max_steps: 10

  evolve_executor_chat:
    max_rounds: 3

  evolve_executor_fuse:
    max_rounds: 3
    react_max_steps: 10
    score_threshold: 0.99

summarizers:
  evolve_summary:
    react_max_steps: 5

# ------------------------------------------------------------------------------
# Define main evolution process configuration
# ------------------------------------------------------------------------------
evolve:
  task: |
    You are a world-class expert in high-performance GPU computing, specializing in Triton kernel programming for PyTorch. Your expertise includes writing custom Triton kernels, fusing FP8 dequantization with matrix multiply, and optimizing memory access patterns for modern GPU architectures (NVIDIA B200/H100).


  # Component selection
  planner_name: "evolve_planner"
  executor_name: "evolve_executor_fuse"
  summary_name: "evolve_summary"

  # Core parameters
  max_iterations: 40
  target_score: 100.0
  concurrency: 1

  # Skip evaluation of the JSON initial file (it's a task definition, not code)
  initial_score: 0.0
  initial_evaluation: "Initial file is a JSON task definition for MoE FP8 block-scale. No Triton kernel to evaluate yet."

  # Evaluator configuration
  evaluator:
    timeout: 3600

  # Database configurations
  database:
    storage_type: "in_memory"
    num_islands: 1
    population_size: 100
    checkpoint_interval: 1
    sampling_weight_power: 2
